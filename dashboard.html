<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f5f5;
}

.member-photo{
width:50px;
height:50px;
object-fit:cover;
border-radius:50%;
}

.card-stat{
text-align:center;
}

</style>

</head>
<body>

<div class="container py-4">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>
Sub Divisional Library Miao - Dashboard
</h2>

<button
class="btn btn-danger"
onclick="logout()">
Logout
</button>

</div>

<div class="row mb-4">

<div class="col-md-3">

<div class="card card-stat">

<div class="card-body">

<h5>Total Members</h5>

<h2 id="totalMembers">0</h2>

</div>

</div>

</div>

</div>

<div class="mb-3">

<input
id="searchBox"
class="form-control"
placeholder="Search Name / Member ID / Mobile">

</div>

<div class="mb-3">

<button
class="btn btn-success"
onclick="exportExcel()">
Export Excel
</button>

<button
class="btn btn-primary ms-2"
onclick="printMembers()">
Print Members
</button>

<button
class="btn btn-warning ms-2"
onclick="generateReport()">
Monthly Report
</button>

</div>

<table class="table table-bordered table-striped">

<thead>

<tr>

<th>Photo</th>
<th>Member ID</th>
<th>Name</th>
<th>Mobile</th>
<th>Membership</th>
<th>Card</th>
<th>Action</th>

</tr>

</thead>

<tbody id="memberTable"></tbody>

</table>

</div>

<script>

// =====================================
// LOGIN PROTECTION
// =====================================

if(
sessionStorage.getItem(
"libraryLoggedIn"
)!=="yes"
){

window.location.href =
"login.html";

}

// =====================================
// APPS SCRIPT URL
// =====================================

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbwu7yamVKdb7h9VWGGQ_eUHGpUJesvP4tinAEHAKLhc31tyeEEeOyPdboF0AUwZJLjS/exec";

let allMembers = [];

loadDashboard();

async function loadDashboard(){

await loadStats();
await loadMembers();

}

async function loadStats(){

try{

const response =
await fetch(
SCRIPT_URL +
"?action=getDashboardStats"
);

const result =
await response.json();

if(result.status==="success"){

document
.getElementById("totalMembers")
.innerText =
result.totalMembers;

}

}
catch(err){

console.error(err);

}

}

async function loadMembers(){

try{

const response =
await fetch(
SCRIPT_URL +
"?action=getAllMembers"
);

const result =
await response.json();

if(result.status==="success"){

allMembers =
result.members;

renderMembers(
allMembers
);

}

}
catch(err){

console.error(err);

}

}

function renderMembers(members){

const table =
document.getElementById(
"memberTable"
);

table.innerHTML = "";

if(members.length===0){

table.innerHTML=`
<tr>
<td colspan="7" class="text-center">
No Members Found
</td>
</tr>
`;

return;

}

members.forEach(member=>{

table.innerHTML += `

<tr>

<td>
<img
src="${member.photoUrl || 'https://via.placeholder.com/50'}"
class="member-photo">
</td>

<td>${member.memberId}</td>

<td>${member.fullName}</td>

<td>${member.mobile}</td>

<td>${member.membershipType}</td>

<td>

<a
href="member-card.html?id=${member.memberId}"
target="_blank"
class="btn btn-primary btn-sm">

Card

</a>

</td>

<td>

<button
class="btn btn-warning btn-sm"
onclick="editMember('${member.memberId}')">

Edit

</button>

<button
class="btn btn-danger btn-sm ms-1"
onclick="deleteMember('${member.memberId}')">

Delete

</button>

</td>

</tr>

`;

});

}

// =====================================
// SEARCH
// =====================================

document
.getElementById("searchBox")
.addEventListener(
"keyup",
function(){

const keyword =
this.value.toLowerCase();

const filtered =
allMembers.filter(member =>

(member.fullName || "")
.toLowerCase()
.includes(keyword)

||

(member.memberId || "")
.toLowerCase()
.includes(keyword)

||

(member.mobile || "")
.toLowerCase()
.includes(keyword)

);

renderMembers(filtered);

}
);

// =====================================
// DELETE
// =====================================

async function deleteMember(memberId){

if(
!confirm(
"Delete Member : " +
memberId +
" ?"
)
){
return;
}

try{

const response =
await fetch(
SCRIPT_URL +
"?action=deleteMember&memberId=" +
encodeURIComponent(memberId)
);

const result =
await response.json();

alert(result.message);

loadDashboard();

}
catch(err){

alert("Delete Failed");

}

}

// =====================================
// EDIT
// =====================================

async function editMember(memberId){

alert(
"Edit feature connected to backend updateMember()."
);

}

// =====================================
// EXPORT CSV
// =====================================

function exportExcel(){

let csv =
"Member ID,Name,Mobile,Membership Type\n";

allMembers.forEach(m=>{

csv +=
`"${m.memberId}","${m.fullName}","${m.mobile}","${m.membershipType}"\n`;

});

const blob =
new Blob(
[csv],
{
type:"text/csv"
}
);

const a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"LibraryMembers.csv";

a.click();

}

// =====================================
// PRINT
// =====================================

function printMembers(){

window.print();

}

// =====================================
// REPORT
// =====================================

function generateReport(){

alert(
"Total Members : " +
allMembers.length
);

}

// =====================================
// LOGOUT
// =====================================

function logout(){

if(
confirm(
"Are you sure you want to logout?"
)
){

sessionStorage.removeItem(
"libraryLoggedIn"
);

window.location.href =
"login.html";

}

}

</script>

</body>
</html>
