<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Library Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.login-box{
width:420px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.1);
}

</style>

</head>

<body>

<div class="login-box">

<h3 class="text-center mb-4">
Library Admin Login
</h3>

<div class="mb-3">

<label class="form-label">
Username
</label>

<input
type="text"
id="username"
class="form-control">

</div>

<div class="mb-3">

<label class="form-label">
Password
</label>

<input
type="password"
id="password"
class="form-control">

</div>

<div class="d-grid">

<button
class="btn btn-primary"
onclick="login()">

Login

</button>

</div>

<div
id="msg"
class="text-danger mt-3 text-center">

</div>

</div>

<script>

const ADMIN_USER =
"admin";

const ADMIN_PASS =
"library@2026";

function login(){

const user =
document
.getElementById("username")
.value
.trim();

const pass =
document
.getElementById("password")
.value
.trim();

if(
user === ADMIN_USER &&
pass === ADMIN_PASS
){

sessionStorage.setItem(
"libraryLoggedIn",
"yes"
);

window.location.href =
"dashboard.html";

}
else{

document
.getElementById("msg")
.innerText =
"Invalid Username or Password";

}

}

</script>

</body>
</html>
