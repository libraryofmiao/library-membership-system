<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Library Membership Card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js">

function openVerification(){

const memberId =
document.getElementById("memberId").innerText;

window.open(
"verify.html?id=" + encodeURIComponent(memberId),
"_blank"
);

}

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js">

function openVerification(){

const memberId =
document.getElementById("memberId").innerText;

window.open(
"verify.html?id=" + encodeURIComponent(memberId),
"_blank"
);

}

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">

function openVerification(){

const memberId =
document.getElementById("memberId").innerText;

window.open(
"verify.html?id=" + encodeURIComponent(memberId),
"_blank"
);

}

</script>

<style>

body{
    background:#f5f5f5;
}

.card-wrapper{
    max-width:900px;
    margin:auto;
}

.member-card{

    width:850px;
    height:520px;

    background:#fff;

    border:3px solid #0d6efd;

    border-radius:15px;

    overflow:hidden;

    position:relative;
}

.header{

    background:#0d6efd;

    color:#fff;

    text-align:center;

    padding:15px;
}

.body-section{
    padding:20px;
}

.photo{

    width:160px;
    height:190px;

    object-fit:cover;

    border:2px solid #ccc;
}

.member-info{

    font-size:18px;

    line-height:2;
}

.footer{

    position:absolute;

    bottom:0;

    width:100%;

    text-align:center;

    background:#f1f1f1;

    padding:10px;
}

.qr{
    text-align:center;
}

@media(max-width:900px){

.member-card{

    width:100%;
    height:auto;

}

}


#libraryLogo{
display:block;
margin:auto;
height:80px;
width:auto;
margin-bottom:10px;
background:white;
border-radius:50%;
padding:5px;
}
</style>

</head>

<body>

<div class="container py-4">

<div class="card-wrapper">

<h2 class="text-center mb-3">
Digital Membership Card
</h2>

<div id="membershipCard" class="member-card">

<div class="header">

<img
id="libraryLogo"
src="https://drive.google.com/thumbnail?id=1mLDm4Y1bu7UG-WP7h-RzRoDrpQTwY2pe"
alt="Library Logo">

<h3>
Sub Divisional Library Miao
</h3>

<p class="mb-0">
Library Membership Card
</p>

</div>

<div class="body-section">

<div class="row">

<div class="col-md-3 text-center">

<img
id="memberPhoto"
class="photo"
src="https://via.placeholder.com/160x190">

</div>

<div class="col-md-6">

<div class="member-info">

<strong>Name:</strong>
<span id="memberName">
Loading...
</span>

<br>

<strong>Member ID:</strong>
<span id="memberId">
Loading...
</span>

<br>

<strong>Membership:</strong>
<span id="memberType">
General
</span>

<br>

<strong>Issue Date:</strong>
<span id="issueDate">
-
</span>

<br>

<strong>Status:</strong>
<span id="membershipStatus">
Permanent Member
</span>

</div>

</div>

<div class="col-md-3 qr">

<div id="qrcode"></div>

<p class="mt-2">
Scan Verification
</p>

</div>

</div>

</div>

<div
style="
position:absolute;
right:30px;
bottom:70px;
text-align:center;
font-size:14px;
">

____________________

<br>

Authorized Signatory

</div>

<div class="footer">

Sub Divisional Library Miao

</div>

</div>

<div class="text-center mt-4">

<button
class="btn btn-primary"
onclick="downloadCard()">

Download PDF Card

</button>

<button
class="btn btn-success ms-2"
onclick="window.print()">

Print Card

</button>

<button
class="btn btn-info ms-2"
onclick="openVerification()">
Verify Member
</button>

</div>

</div>

</div>

<script>

// =====================================================
// APPS SCRIPT WEB APP URL
// =====================================================

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbwu7yamVKdb7h9VWGGQ_eUHGpUJesvP4tinAEHAKLhc31tyeEEeOyPdboF0AUwZJLjS/exec";


// =====================================================
// GET MEMBER ID FROM URL
// =====================================================

const params =
new URLSearchParams(
window.location.search
);

const memberId =
params.get("id");

if(!memberId){

alert(
"Member ID missing in URL"
);

}
else{

loadMember(memberId);

}


// =====================================================
// LOAD MEMBER
// =====================================================

async function loadMember(memberId){

try{

const response =
await fetch(

SCRIPT_URL +
"?action=getMember&memberId=" +
encodeURIComponent(memberId)

);

const result =
await response.json();

if(result.status !== "success"){

alert(result.message);

return;

}

fillCard(result.member);

}
catch(err){

console.error(err);

alert(
"Unable to load member data."
);

}

}


// =====================================================
// FILL CARD
// =====================================================

function fillCard(member){

document
.getElementById("memberName")
.innerText =
member.fullName;

document
.getElementById("memberId")
.innerText =
member.memberId;

document
.getElementById("memberType")
.innerText =
member.membershipType;

document
.getElementById("issueDate")
.innerText =
member.issueDate;

const photoElement =
document.getElementById(
"memberPhoto"
);

photoElement.src =
member.photoUrl ||
"https://via.placeholder.com/160x190";

photoElement.onerror =
function(){

this.src =
"https://via.placeholder.com/160x190";

};

generateQR(
window.location.href
);

}


// =====================================================
// QR CODE
// =====================================================

function generateQR(memberId){

document
.getElementById("qrcode")
.innerHTML = "";

new QRCode(

document.getElementById(
"qrcode"
),

{

text:
memberId,

width:120,

height:120

}

);

}


// =====================================================
// PDF DOWNLOAD
// =====================================================

async function downloadCard(){

const card =
document.getElementById(
"membershipCard"
);

const canvas =
await html2canvas(
card,
{
scale:3,
useCORS:true
}
);

const imgData =
canvas.toDataURL(
"image/png"
);

const {
jsPDF
} = window.jspdf;

const pdf =
new jsPDF(
"landscape",
"mm",
"a4"
);

pdf.addImage(

imgData,

"PNG",

10,
10,

277,
170

);

const memberId =
document
.getElementById(
"memberId"
)
.innerText;

pdf.save(
memberId + ".pdf"
);

}



function openVerification(){

const memberId =
document.getElementById("memberId").innerText;

window.open(
"verify.html?id=" + encodeURIComponent(memberId),
"_blank"
);

}

</script>

</body>
</html>
