<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Membership Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}

.form-container{
    background:#fff;
    border-radius:12px;
    padding:30px;
    box-shadow:0 0 15px rgba(0,0,0,0.08);
}

.required{
    color:red;
}

.photo-preview{
    width:150px;
    height:180px;
    border:2px dashed #ccc;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    margin-top:10px;
    background:#fafafa;
}

.photo-preview img{
    width:100%;
    height:100%;
    object-fit:cover;
}

h2{
    font-weight:700;
}
</style>
</head>

<body>

<div class="container py-5">

<div class="form-container">

<div class="text-center mb-4">
<h2>Library Membership Registration Form</h2>
<p class="text-muted">
Please fill all required details carefully.
</p>
</div>

<form id="registrationForm">

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">
Full Name <span class="required">*</span>
</label>
<input type="text"
class="form-control"
id="fullName"
required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">
Father's / Guardian's Name
</label>
<input type="text"
class="form-control"
id="guardianName">
</div>

<div class="col-md-4 mb-3">
<label class="form-label">
Gender <span class="required">*</span>
</label>

<select class="form-select" id="gender" required>
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label class="form-label">
Date of Birth <span class="required">*</span>
</label>
<input type="date"
class="form-control"
id="dob"
required>
</div>

<div class="col-md-4 mb-3">
<label class="form-label">
Occupation
</label>
<input type="text"
class="form-control"
id="occupation">
</div>

</div>

<div class="mb-3">
<label class="form-label">
Address <span class="required">*</span>
</label>
<textarea class="form-control"
id="address"
rows="3"
required></textarea>
</div>

<div class="row">

<div class="col-md-4 mb-3">
<label class="form-label">
District
</label>
<input type="text"
class="form-control"
id="district">
</div>

<div class="col-md-4 mb-3">
<label class="form-label">
State
</label>
<input type="text"
class="form-control"
id="state">
</div>

<div class="col-md-4 mb-3">
<label class="form-label">
PIN Code
</label>
<input type="text"
class="form-control"
id="pincode"
maxlength="6">
</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">
Mobile Number <span class="required">*</span>
</label>
<input type="tel"
class="form-control"
id="mobile"
pattern="[0-9]{10}"
maxlength="10"
required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">
Email Address
</label>
<input type="email"
class="form-control"
id="email">
</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">
Membership Type <span class="required">*</span>
</label>

<select class="form-select"
id="membershipType"
required>

<option value="">Select</option>

<option>Student</option>
<option>General</option>
<option>Senior Citizen</option>
<option>Research Scholar</option>
<option>Faculty</option>

</select>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">
Membership Duration
</label>

<select class="form-select"
id="membershipDuration">

<option>1 Year</option>
<option>2 Years</option>
<option>3 Years</option>

</select>
</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
ID Proof Type
</label>

<select class="form-select"
id="idType">

<option value="">Select</option>
<option>Aadhaar Card</option>
<option>Voter ID</option>
<option>PAN Card</option>
<option>Driving License</option>
<option>Passport</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
ID Proof Number
</label>

<input type="text"
class="form-control"
id="idNumber">

</div>

</div>

<hr>

<h5>Photograph Upload</h5>

<div class="mb-3">

<label class="form-label">
Upload Passport Size Photograph
</label>

<input type="file"
class="form-control"
id="photo"
accept="image/*">

<div class="photo-preview"
id="previewBox">

<span>Preview</span>

</div>

</div>

<hr>

<div class="form-check mb-4">

<input class="form-check-input"
type="checkbox"
id="declaration"
required>

<label class="form-check-label">

I hereby declare that the information
provided above is true and correct.

</label>

</div>

<div class="text-center">

<button type="submit"
class="btn btn-primary btn-lg">

Submit Registration

</button>

<button type="reset"
class="btn btn-secondary btn-lg ms-2">

Reset

</button>

</div>

</form>

</div>

</div>

<script>

// =====================================================
// GOOGLE APPS SCRIPT WEB APP URL
// Replace after deployment
// =====================================================

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbwu7yamVKdb7h9VWGGQ_eUHGpUJesvP4tinAEHAKLhc31tyeEEeOyPdboF0AUwZJLjS/exec";


// =====================================================
// PHOTO PREVIEW
// =====================================================

const photoInput = document.getElementById("photo");
const previewBox = document.getElementById("previewBox");

photoInput.addEventListener("change", function () {

    const file = this.files[0];

    if (file) {

        const reader = new FileReader();

        reader.onload = function (e) {

            previewBox.innerHTML =
                `<img src="${e.target.result}" alt="Photo">`;

        };

        reader.readAsDataURL(file);
    }

});


// =====================================================
// FORM SUBMIT
// =====================================================

document
.getElementById("registrationForm")
.addEventListener("submit", async function (e) {

e.preventDefault();

const submitBtn =
document.querySelector('button[type="submit"]');

submitBtn.disabled = true;
submitBtn.innerText = "Saving...";

try {

    let photoBase64 = "";

    const photoFile =
    document.getElementById("photo").files[0];

    if (photoFile) {

        photoBase64 =
        await convertToBase64(photoFile);

    }

    const memberData = {

        fullName:
        document.getElementById("fullName").value.trim(),

        guardianName:
        document.getElementById("guardianName").value.trim(),

        gender:
        document.getElementById("gender").value,

        dob:
        document.getElementById("dob").value,

        occupation:
        document.getElementById("occupation").value.trim(),

        address:
        document.getElementById("address").value.trim(),

        district:
        document.getElementById("district").value.trim(),

        state:
        document.getElementById("state").value.trim(),

        pincode:
        document.getElementById("pincode").value.trim(),

        mobile:
        document.getElementById("mobile").value.trim(),

        email:
        document.getElementById("email").value.trim(),

        membershipType:
        document.getElementById("membershipType").value,

        membershipDuration:
        document.getElementById("membershipDuration").value,

        idType:
        document.getElementById("idType").value,

        idNumber:
        document.getElementById("idNumber").value.trim(),

        photo:
        photoBase64

    };



    const response =
    await fetch(SCRIPT_URL, {

        method: "POST",

        body: JSON.stringify(memberData)

    });

    const result =
    await response.json();



    if (result.status === "success") {

        alert(
        "Registration Successful!\n\n" +
        "Membership ID : " +
        result.memberId
        );

        document
        .getElementById("registrationForm")
        .reset();

        previewBox.innerHTML =
        "<span>Preview</span>";

    }

    else {

        alert(result.message);

    }

}
catch (error) {

    console.error(error);

    alert(
    "Unable to connect to server."
    );

}

submitBtn.disabled = false;
submitBtn.innerText =
"Submit Registration";

});


// =====================================================
// FILE TO BASE64
// =====================================================

function convertToBase64(file) {

return new Promise((resolve, reject) => {

    const reader = new FileReader();

    reader.readAsDataURL(file);

    reader.onload = () => {

        resolve(reader.result);

    };

    reader.onerror = error => {

        reject(error);

    };

});

}

</script>

</body>
</html>
