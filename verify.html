<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Member Verification</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.verify-card{
max-width:700px;
margin:auto;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

.member-photo{
width:180px;
height:220px;
object-fit:cover;
border:2px solid #ddd;
border-radius:10px;
}

.status-active{
color:green;
font-weight:bold;
font-size:22px;
}

.status-inactive{
color:red;
font-weight:bold;
font-size:22px;
}

.logo{
height:90px;
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="container py-5">

<div class="verify-card">

<div class="text-center">

<img
class="logo"
src="https://drive.google.com/thumbnail?id=1mLDm4Y1bu7UG-WP7h-RzRoDrpQTwY2pe"
alt="Library Logo">

<h2>Sub Divisional Library Miao</h2>

<h4 class="mb-4">
Member Verification
</h4>

</div>

<div id="loading" class="text-center">

<div class="spinner-border text-primary"></div>

<p class="mt-3">
Verifying Member...
</p>

</div>

<div id="resultArea" style="display:none;">

<div class="row">

<div class="col-md-4 text-center">

<img
id="memberPhoto"
class="member-photo"
src="https://via.placeholder.com/180x220">

</div>

<div class="col-md-8">

<h3 id="verifyStatus"></h3>

<hr>

<p>
<strong>Name:</strong>
<span id="memberName"></span>
</p>

<p>
<strong>Member ID:</strong>
<span id="memberId"></span>
</p>

<p>
<strong>Membership Type:</strong>
<span id="memberType"></span>
</p>

<p>
<strong>Status:</strong>
<span id="memberStatus"></span>
</p>

</div>

</div>

</div>

<div id="notFound" style="display:none;">

<div class="alert alert-danger text-center">

<h3>
✗ MEMBER NOT FOUND
</h3>

<p>
The QR Code is invalid or the member does not exist.
</p>

</div>

</div>

</div>

</div>

<script>

// =====================================
// APPS SCRIPT URL
// =====================================

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbwu7yamVKdb7h9VWGGQ_eUHGpUJesvP4tinAEHAKLhc31tyeEEeOyPdboF0AUwZJLjS/exec";

// =====================================
// GET MEMBER ID
// =====================================

const params =
new URLSearchParams(
window.location.search
);

const memberId =
params.get("id");

// =====================================
// START VERIFY
// =====================================

if(!memberId){

document.getElementById(
"loading"
).style.display="none";

document.getElementById(
"notFound"
).style.display="block";

}else{

verifyMember(memberId);

}

// =====================================
// VERIFY MEMBER
// =====================================

async function verifyMember(memberId){

try{

const response =
await fetch(
SCRIPT_URL +
"?action=verifyMember&memberId=" +
encodeURIComponent(memberId)
);

const result =
await response.json();

console.log(result);

document.getElementById(
"loading"
).style.display="none";

if(result.valid !== true){

document.getElementById(
"notFound"
).style.display="block";

return;

}

loadMemberData(result);

}
catch(err){

console.error(err);

document.getElementById(
"loading"
).style.display="none";

document.getElementById(
"notFound"
).style.display="block";

}

}

// =====================================
// LOAD MEMBER DATA
// =====================================

function loadMemberData(result){

document.getElementById(
"resultArea"
).style.display="block";

document.getElementById(
"memberName"
).innerText =
result.fullName || "";

document.getElementById(
"memberId"
).innerText =
result.memberId || "";

document.getElementById(
"memberType"
).innerText =
result.membershipType || "";

// Works with BOTH:
// status: "Active"
// memberStatus: "Active"

const memberStatus =
result.memberStatus ||
result.status ||
"";

document.getElementById(
"memberStatus"
).innerText =
memberStatus;

if(
String(memberStatus)
.trim()
.toLowerCase()
==="active"
){

document.getElementById(
"verifyStatus"
).innerHTML =
'<span class="status-active">✓ VERIFIED MEMBER</span>';

}
else{

document.getElementById(
"verifyStatus"
).innerHTML =
'<span class="status-inactive">✗ INACTIVE MEMBER</span>';

}

if(result.photoUrl){

document.getElementById(
"memberPhoto"
).src =
result.photoUrl;

}

}

</script>

</body>
</html>
